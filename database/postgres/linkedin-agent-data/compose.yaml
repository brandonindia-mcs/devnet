services:
  postgres:
    container_name: marketing_ai_instance
    image: postgres:17
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: agent_super
      POSTGRES_PASSWORD: P@ssw0rd!
      POSTGRES_DB: linkedin_posting_database
    volumes:
      - pgdata_marketing_ai_application:/var/lib/postgresql/data
      - ./bootstrap:/docker-entrypoint-initdb.d
      - ../configs/postgresql.conf.17.appdev:/etc/postgresql/postgresql.conf
      - ../configs/pg_hba.conf.17.appdev:/etc/postgresql/pg_hba.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    networks:
      - postgres

volumes:
  pgdata_marketing_ai_application:

networks:
  postgres:
    name: postgres
    external: true