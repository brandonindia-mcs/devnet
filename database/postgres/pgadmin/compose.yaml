services:
  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    restart: unless-stopped
    ports:
      - 8080:80
    environment:
      PGADMIN_DEFAULT_EMAIL: $PGADMINUSER
      PGADMIN_DEFAULT_PASSWORD: $PGADMINPSWD
    networks:
      - postgres

networks:
  postgres:
    name: postgres
    external: true
